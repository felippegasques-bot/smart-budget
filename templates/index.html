<!DOCTYPE html>
<html>
<head>
    <title>Sistema de Gastos</title>

    <style>
        body {
            font-family: Arial;
            background-color: #f4f6f8;
            text-align: center;
        }

        .container {
            width: 80%;
            margin: auto;
            background: white;
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0px 0px 10px rgba(0,0,0,0.1);
        }

        input {
            padding: 10px;
            margin: 5px;
            border-radius: 5px;
            border: 1px solid #ccc;
        }

        button {
            padding: 10px 20px;
            border: none;
            background: linear-gradient(135deg, #4CAF50, #2ecc71);
            color: white;
            border-radius: 8px;
            cursor: pointer;
        }

        table {
            margin: auto;
            border-collapse: collapse;
            width: 80%;
            background: white;
        }

        th {
            background-color: #4CAF50;
            color: white;
        }

        th, td {
            padding: 12px;
            border-bottom: 1px solid #ddd;
        }

        tr:hover {
            background-color: #f1f1f1;
        }
    </style>
</head>

<body>

<div class="container">

<h1>💰 Controle de Gastos</h1>

<form action="/add" method="post">
    <input type="text" name="descricao" placeholder="Descrição" required>
    <input type="number" step="0.01" name="valor" placeholder="Valor" required>
    <input type="text" name="categoria" placeholder="Categoria" required>
    <button type="submit">Adicionar</button>
</form>

<h2>📊 Lista de Gastos</h2>

<table>
<tr>
    <th>Descrição</th>
    <th>Valor</th>
    <th>Categoria</th>
    <th>Data</th>
</tr>

{% for g in gastos %}
<tr>
    <td>{{ g[1] }}</td>
    <td>R$ {{ g[2] }}</td>
    <td>{{ g[3] }}</td>
    <td>{{ g[4] }}</td>
</tr>
{% endfor %}

</table>

<br><br>

<a href="/grafico">
    <button>Ver Gráfico</button>
</a>

</div>

</body>
</html>
